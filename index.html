<!DOCTYPE html> <html lang="fr"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Clara Decros | Portfolio</title> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"> <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> <style> :root { --bg: #f8f6f4; --beige: #e8dfd8; --rose: #d4a3a3; --rose-soft: #e7c8c8; --text: #2f2f2f; --white: #ffffff; } body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(120deg, #f8f6f4, #f1ebe5); color: var(--text); overflow-x: hidden; } /* ANIMATED BACKGROUND */ body::before { content: ""; position: fixed; width: 200%; height: 200%; background: radial-gradient(circle at 30% 30%, #e7c8c8 0%, transparent 40%), radial-gradient(circle at 70% 60%, #d4a3a3 0%, transparent 40%), radial-gradient(circle at 50% 80%, #e8dfd8 0%, transparent 40%); animation: moveBg 12s infinite alternate ease-in-out; z-index: -1; } @keyframes moveBg { 0% {transform: translate(0,0);} 100% {transform: translate(-10%, -10%);} } /* NAV */ .nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; padding: 15px 0; backdrop-filter: blur(8px); background: rgba(255,255,255,0.7); } .nav-links { display: flex; gap: 30px; } .nav-item { border: none; background: none; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; position: relative; } .nav-item i { color: var(--rose); } .nav-item::after { content: ""; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background: linear-gradient(90deg, var(--rose), var(--rose-soft)); transition: 0.3s; } .nav-item:hover::after { width: 100%; } /* HERO */ .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; gap: 80px; padding: 120px 10%; } .photo img { width: 340px; border-radius: 20px; box-
