<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clara Decros | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f6f4;
            --beige: #e8dfd8;
            --rose: #d4a3a3;
            --rose-soft: #e7c8c8;
            --text: #2f2f2f;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* FOND ANIMÉ PLUS DOUX ET MODERNE */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(212, 163, 163, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(231, 200, 200, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(232, 223, 216, 0.3) 0%, transparent 50%);
            animation: moveBg 20s infinite alternate ease-in-out;
        }

        @keyframes moveBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }

        /* NAV GLASSMORPHISM */
        .nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            padding: 12px 30px;
            backdrop-filter: blur(15px);
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-item {
            border: none;
            background: none;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.4s;
            opacity: 0.7;
        }

        .nav-item i { color: var(--rose); font-size: 14px; }

        .nav-item:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(40px, 8vw, 120px);
            padding: 0 10%;
        }

        /* PHOTO STYLE MODERNE */
        .photo {
            position: relative;
        }

        .photo::after { /* Décoration derrière l'image */
            content: "";
            position: absolute;
            top: 20px; right: -20px;
            width: 100%; height: 100%;
            border: 2px solid var(--rose-soft);
            border-radius: 20px;
            z-index: -1;
            transition: 0.5s;
        }

        .photo:hover::after {
            transform: translate(-10px, -10px);
        }

        .photo img {
            width: clamp(280px, 25vw, 380px);
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.08);
            display: block;
            transition: 0.5s;
        }

        /* TEXT CONTENT */
        .content {
            max-width: 550px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin: 0;
            line-height: 1.1;
            font-weight: 800;
        }

        h1 span {
            display: block;
            color: var(--rose);
            margin-top: 5px;
        }

        .line {
            width: 60px;
            height: 4px;
            background: var(--rose);
            margin: 30px 0;
            border-radius: 2px;
        }

        p {
            line-height: 1.9;
            font-size: 1.05rem;
            color: #555;
            font-weight: 300;
        }

        /* ANIMATIONS */
        .fade-in {
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width:900px){
            .nav { width: 90%; top: 10px; padding: 10px; }
            .nav-links { gap: 15px; }
            .nav-item span { display: none; } /* On ne garde que les icônes sur mobile */
            .hero { flex-direction: column; text-align: center; padding-top: 100px; padding-bottom: 50px;}
            .line { margin: 25px auto; }
            .photo::after { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="nav">
        <div class="nav-links">
            <button class="nav-item" onclick="location.href='index.html'"><i class="fas fa-home"></i><span>Accueil</span></button>
            <button class="nav-item" onclick="location.href='infos.html'"><i class="fas fa-user"></i><span>Profil</span></button>
            <button class="nav-item" onclick="location.href='projets.html'"><i class="fas fa-chart-bar"></i><span>Projets</span></button>
            <button class="nav-item" onclick="location.href='bilan.html'"><i class="fas fa-book"></i><span>Bilan</span></button>
            <button class="nav-item" onclick="location.href='contact.html'"><i class="fas fa-phone"></i><span>Contact</span></button>
        </div>
    </nav>

    <section class="hero fade-in">
        <div class="photo">
            <img src="photomoi.jpeg" alt="Clara Decros">
        </div>
        <div class="content">
            <h1>Bonjour, je suis <span>Clara Decros</span></h1>
            <div class="line"></div>
            <p>
                Bienvenue sur mon portfolio. Étudiante en <strong>BUT Science des données</strong>, 
                je vous invite à découvrir mon parcours, mes projets et mes compétences.
                <br><br> 
                Ce site reflète mon évolution, ma créativité et ma passion pour l'analyse et la valorisation des données.
            </p>
        </div>
    </section>
</body>
</html>
