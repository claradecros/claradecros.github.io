<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clara Decros | Portfolio</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F9F7F2;      /* Beige très clair / Crème */
            --accent-rose: #D4A3A3;    /* Vieux rose mat (plus mature) */
            --text-dark: #4A4A4A;      /* Gris anthracite pour la douceur */
            --white-marble: #FFFFFF;
            --border-color: #EAE3D8;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Barre de navigation épurée */
        .nav-container {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); /* Effet de flou moderne */
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.4s ease;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px 0;
            position: relative;
        }

        /* Soulignement élégant au survol */
        .nav-item::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: var(--accent-rose);
            transition: width 0.3s ease;
        }

        .nav-item:hover {
            color: var(--accent-rose);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .nav-item i {
            font-size: 16px;
            color: var(--accent-rose);
        }

        /* Section de présentation */
        .hero {
            text-align: center;
            max-width: 800px;
            padding: 0 20px;
        }

        .hero h1 {
            font-weight: normal;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin-bottom: 10px;
            color: var(--text-dark);
            opacity: 0;
            animation: fadeInBlur 1.8s forwards;
        }

        .hero p {
            font-style: italic;
            font-size: 1.1rem;
            color: #888;
            opacity: 0;
            animation: fadeIn 2s 0.8s forwards;
        }

        /* Petite ligne décorative */
        .divider {
            width: 50px;
            height: 1px;
            background: var(--accent-rose);
            margin: 30px auto;
            opacity: 0;
            animation: fadeIn 2s 0.5s forwards;
        }

        /* Animations */
        @keyframes fadeInBlur {
            from { 
                opacity: 0; 
                filter: blur(10px);
                transform: translateY(10px);
            }
            to { 
                opacity: 1; 
                filter: blur(0);
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .nav-links {
                gap: 15px;
            }
            .nav-item span {
                display: none; /* Cache le texte sur mobile pour garder les icônes */
            }
            .nav-item i {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="nav-links">
            <button class="nav-item" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> <span>Accueil</span>
            </button>
            <button class="nav-item" onclick="location.href='projets.html'">
                <i class="fas fa-feather-alt"></i> <span>Projets</span>
            </button>
            <button class="nav-item" onclick="location.href='bilan.html'">
                <i class="fas fa-leaf"></i> <span>Bilan</span>
            </button>
            <button class="nav-item" onclick="location.href='infos.html'">
                <i class="fas fa-fingerprint"></i> <span>Profil</span>
            </button>
        </div>
    </nav>

    <main class="hero">
        <h1>Clara Decros</h1>
        <div class="divider"></div>
        <p>Étudiante & Créatrice de projets</p>
    </main>

</body>
</html>
