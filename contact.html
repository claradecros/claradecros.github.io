<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Contacts | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

/* ===== UNIQUEMENT COULEURS ALIGNÉES BILAN ===== */

:root{
    --rose:#d4a3a3;
    --rose-soft:#e7c8c8;
    --text:#2f2f2f;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(120deg,#f8f6f4,#f1ebe5);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* FOND ANIMÉ (mêmes tons que bilan) */

body::before{
    content:"";
    position:fixed;
    width:220%;
    height:220%;
    background:
    radial-gradient(circle at 20% 20%, rgba(231,200,200,0.75) 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(212,163,163,0.55) 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(248,235,235,0.75) 0%, transparent 35%);
    animation:bgMove 14s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes bgMove{
    0%{
        transform:translate(0,0) scale(1);
    }
    100%{
        transform:translate(-8%,-8%) scale(1.08);
    }
}

/* NAVIGATION (couleur harmonisée) */

.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:16px 0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
    box-shadow:0 4px 18px rgba(0,0,0,0.04);
}

.nav-item i{
    color:var(--rose);
}

.nav-item::after{
    background:linear-gradient(90deg,var(--rose),var(--rose-soft));
}

/* TITRES */

h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    text-align:center;
    margin-bottom:10px;
}

h1 span{
    color:var(--rose);
}

/* ligne */

.line{
    width:90px;
    height:4px;
    background:linear-gradient(90deg,var(--rose),var(--rose-soft));
    margin:18px auto 30px;
    border-radius:20px;
}

/* BOUTONS */

.btn:hover{
    background:var(--rose);
}

/* LINKEDIN BUTTON (harmonisé rose si hover) */

.linkedin:hover{
    background:var(--rose);
}

/* CV */

.cv-btn{
    background:linear-gradient(135deg,var(--rose),#c98d8d);
}

.cv-btn:hover{
    box-shadow:0 20px 40px rgba(212,163,163,0.35);
}

</style>
</head>

<body>

<!-- NAV (INCHANGÉE) -->
<nav class="nav">

    <div class="nav-links">

        <button class="nav-item" onclick="location.href='index.html'">
            <i class="fas fa-home"></i>
            <span>Accueil</span>
        </button>

        <button class="nav-item" onclick="location.href='infos.html'">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </button>

        <button class="nav-item" onclick="location.href='projets.html'">
            <i class="fas fa-chart-bar"></i>
            <span>Projets</span>
        </button>

        <button class="nav-item" onclick="location.href='bilan.html'">
            <i class="fas fa-book"></i>
            <span>Bilan</span>
        </button>

        <button class="nav-item active">
            <i class="fas fa-phone"></i>
            <span>Contact</span>
        </button>

    </div>

</nav>

<!-- CONTENU (INCHANGÉ) -->
<div class="container">
    <div class="contact-card">

        <h1>Contactez-<span>moi</span></h1>

        <div class="line"></div>

        <p class="intro">
            Merci d’avoir pris le temps de découvrir mon univers.
        </p>

        <!-- le reste de ton HTML reste STRICTEMENT IDENTIQUE -->

    </div>
</div>

</body>
</html>
