<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Contacts | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
   (function(){
      emailjs.init("TON_PUBLIC_KEY"); // 👈 À REMPLACER
   })();
</script>

<style>

:root{
    --rose:#d4a3a3;
    --rose-soft:#e7c8c8;
    --text:#2f2f2f;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(120deg,#f8f6f4,#f1ebe5);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* FOND ANIMÉ */

body::before{
    content:"";
    position:fixed;
    width:220%;
    height:220%;
    background:
    radial-gradient(circle at 20% 20%, rgba(231,200,200,0.8) 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(212,163,163,0.6) 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(248,235,235,0.8) 0%, transparent 35%);
    animation:bgMove 14s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes bgMove{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(-8%,-8%) scale(1.08); }
}

/* NAV */

.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:16px 0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
}

/* CONTAINER */

.container{
    width:min(92%,1000px);
    margin:130px auto 70px;
}

.contact-card{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(18px);
    border-radius:38px;
    padding:60px;
}

/* TITRE */

h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    text-align:center;
}

h1 span{ color:var(--rose); }

/* FORM */

form{
    max-width:550px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:16px;
}

input, textarea{
    padding:16px;
    border-radius:16px;
    border:1px solid rgba(0,0,0,0.08);
    outline:none;
    font-family:'Poppins',sans-serif;
    background:rgba(255,255,255,0.75);
}

/* PLACEHOLDER STYLE */
textarea::placeholder{
    color:#b8b8b8;
    font-style:italic;
}

/* BTN */

.btn{
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:#2f2f2f;
    color:white;
    font-weight:600;
}

.btn:hover{
    background:var(--rose);
}

/* CV */

.cv-btn{
    display:inline-block;
    margin-top:30px;
    padding:18px 32px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--rose),#c98d8d);
    color:white;
    text-decoration:none;
}

/* TOAST */

.toast{
    position:fixed;
    bottom:25px;
    right:25px;
    background:rgba(47,47,47,0.95);
    color:white;
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
    transition:0.3s;
}

.toast.show{
    opacity:1;
}

</style>
</head>

<body>

<div class="container">

    <div class="contact-card">

        <h1>Contactez-<span>moi</span></h1>

        <form onsubmit="sendMail(event)">

            <input id="email" type="email" placeholder="Votre email" required>

            <textarea
                id="message"
                rows="6"
                placeholder="Bonjour Madame Decros,

Je vous contacte car..."
                required
            ></textarea>

            <button class="btn" type="submit">
                <i class="fas fa-paper-plane"></i> Envoyer
            </button>

        </form>

        <div style="text-align:center;">
            <a class="cv-btn" href="Curriculum vitae DECROS Clara.pdf" download>
                Télécharger mon CV
            </a>
        </div>

    </div>

</div>

<div class="toast" id="toast"></div>

<script>

function sendMail(event){
    event.preventDefault();

    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    emailjs.send("TON_SERVICE_ID", "TON_TEMPLATE_ID", {
        from_email: email,
        message: message
    })
    .then(() => {
        showToast("Message envoyé ✨");
    })
    .catch(() => {
        showToast("Erreur d'envoi ❌");
    });
}

function showToast(text){
    const toast = document.getElementById("toast");
    toast.textContent = text;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2500);
}

</script>

</body>
</html>
