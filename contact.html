<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Contacts | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --rose:#d4a3a3;
    --rose-soft:#e7c8c8;
    --text:#2f2f2f;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(120deg,#f8f6f4,#f1ebe5);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* FOND ANIMÉ */

body::before{
    content:"";
    position:fixed;
    width:220%;
    height:220%;
    background:
    radial-gradient(circle at 20% 20%, rgba(231,200,200,0.8) 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(212,163,163,0.6) 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(248,235,235,0.8) 0%, transparent 35%);
    animation:bgMove 14s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes bgMove{
    0%{
        transform:translate(0,0) scale(1);
    }

    100%{
        transform:translate(-8%,-8%) scale(1.08);
    }
}

/* NAVIGATION */

.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:16px 0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
    box-shadow:0 4px 18px rgba(0,0,0,0.04);
}

.nav-links{
    display:flex;
    gap:35px;
}

.nav-item{
    border:none;
    background:none;
    color:var(--text);
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    position:relative;
    transition:0.3s ease;
    font-weight:500;
}

.nav-item i{
    color:var(--rose);
}

.nav-item::after{
    content:"";
    position:absolute;
    width:0;
    height:2px;
    bottom:-6px;
    left:0;
    background:linear-gradient(90deg,var(--rose),var(--rose-soft));
    transition:0.3s ease;
}

.nav-item:hover::after,
.nav-item.active::after{
    width:100%;
}

/* CONTAINER */

.container{
    width:min(92%,1000px);
    margin:130px auto 70px;
    animation:fadeUp 1s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* CARTE */

.contact-card{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(18px);
    border-radius:38px;
    padding:60px;
    box-shadow:0 25px 50px rgba(0,0,0,0.06);
    border:1px solid rgba(255,255,255,0.4);
    position:relative;
    overflow:hidden;
}

.contact-card::before{
    content:"";
    position:absolute;
    top:-150px;
    right:-150px;
    width:300px;
    height:300px;
    background:radial-gradient(circle,rgba(212,163,163,0.18),transparent 70%);
    border-radius:50%;
}

/* TITRES */

h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    text-align:center;
    margin-bottom:10px;
}

h1 span{
    color:var(--rose);
}

.line{
    width:90px;
    height:4px;
    background:linear-gradient(90deg,var(--rose),var(--rose-soft));
    margin:18px auto 30px;
    border-radius:20px;
}

.intro{
    text-align:center;
    max-width:650px;
    margin:0 auto 50px;
    line-height:1.8;
    color:#666;
}

/* GRID CONTACT */

.contact-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    margin-bottom:50px;
}

/* BOX */

.contact-box{
    background:rgba(255,255,255,0.3);
    border:1px solid rgba(255,255,255,0.4);
    border-radius:28px;
    padding:35px 25px;
    text-align:center;
    transition:0.4s ease;
}

.contact-box:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.icon-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(255,255,255,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
}

.icon-circle i{
    font-size:2rem;
}

.contact-box h3{
    font-family:'Playfair Display',serif;
    font-size:1.5rem;
    margin-bottom:10px;
}

.contact-box p{
    color:#666;
    margin-bottom:20px;
}

/* BOUTONS */

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    text-decoration:none;
    color:white;
    background:#2f2f2f;
    transition:0.35s ease;
    font-weight:600;
    font-family:'Poppins',sans-serif;
}

.btn:hover{
    transform:translateY(-3px);
    background:var(--rose);
}

.linkedin{
    background:#0077b5;
}

.linkedin:hover{
    background:#005f91;
}

.phone{
    background:#34b7f1;
}

.phone:hover{
    background:#2198ce;
}

/* FORMULAIRE */

.form-title{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:2rem;
    margin-bottom:25px;
}

form{
    max-width:550px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:16px;
}

input,
textarea{
    padding:16px;
    border-radius:16px;
    border:1px solid rgba(0,0,0,0.08);
    outline:none;
    font-family:'Poppins',sans-serif;
    background:rgba(255,255,255,0.75);
}

textarea{
    resize:none;
}

/* BOUTON CV */

.cv-container{
    text-align:center;
    margin-top:40px;
}

.cv-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:18px 32px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--rose),#c98d8d);
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:0.35s ease;
    box-shadow:0 15px 30px rgba(212,163,163,0.25);
}

.cv-btn:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 20px 40px rgba(212,163,163,0.35);
}

/* TOAST */

.toast{
    position:fixed;
    bottom:25px;
    right:25px;
    background:rgba(47,47,47,0.95);
    color:white;
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
    visibility:hidden;
    transform:translateY(20px);
    transition:0.35s ease;
}

.toast.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

/* RESPONSIVE */

@media(max-width:768px){

    .nav-links{
        gap:15px;
    }

    .nav-item span{
        display:none;
    }

    h1{
        font-size:2.8rem;
    }

    .contact-card{
        padding:35px 22px;
    }

}

</style>
</head>

<body>

<!-- NAVIGATION -->

<nav class="nav">

    <div class="nav-links">

        <button class="nav-item" onclick="location.href='index.html'">
            <i class="fas fa-home"></i>
            <span>Accueil</span>
        </button>

        <button class="nav-item" onclick="location.href='infos.html'">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </button>

        <button class="nav-item" onclick="location.href='projets.html'">
            <i class="fas fa-chart-bar"></i>
            <span>Projets</span>
        </button>

        <button class="nav-item" onclick="location.href='bilan.html'">
            <i class="fas fa-book"></i>
            <span>Bilan</span>
        </button>

        <button class="nav-item active">
            <i class="fas fa-phone"></i>
            <span>Contact</span>
        </button>

    </div>

</nav>

<!-- CONTENU -->

<div class="container">

    <div class="contact-card">

        <h1>Contactez-<span>moi</span></h1>

        <div class="line"></div>

        <p class="intro">
            Merci d’avoir pris le temps de découvrir mon univers.
            Que ce soit pour une alternance, un projet ou un échange,
            je serai ravie de vous répondre.
        </p>

        <!-- CONTACTS -->

        <div class="contact-grid">

            <!-- EMAIL -->

            <div class="contact-box">

                <div class="icon-circle">
                    <i class="fas fa-envelope" style="color:var(--rose);"></i>
                </div>

                <h3>Email</h3>

                <p>
                    claradecros@gmail.com
                </p>

                <button class="btn" onclick="copyMail()">
                    <i class="fas fa-copy"></i>
                    Copier
                </button>

            </div>

            <!-- LINKEDIN -->

            <div class="contact-box">

                <div class="icon-circle">
                    <i class="fab fa-linkedin" style="color:#0077b5;"></i>
                </div>

                <h3>LinkedIn</h3>

                <p>
                    Clara Decros
                </p>

                <a href="https://www.linkedin.com/in/clara-decros-345502342"
                   target="_blank"
                   class="btn linkedin">

                    <i class="fab fa-linkedin"></i>
                    Ouvrir

                </a>

            </div>

            <!-- TELEPHONE -->

            <div class="contact-box">

                <div class="icon-circle">
                    <i class="fas fa-phone" style="color:#34b7f1;"></i>
                </div>

                <h3>Téléphone</h3>

                <p>
                    06 19 20 01 72
                </p>

                <a href="tel:+33619200172"
                   class="btn phone">

                    <i class="fas fa-phone"></i>
                    Appeler

                </a>

            </div>

        </div>

        <!-- FORMULAIRE -->

        <h2 class="form-title">
            Envoyer un message
        </h2>

        <form onsubmit="sendMail(event)">

            <input
                id="email"
                type="email"
                placeholder="Votre email"
                required
            >

            <textarea
                id="message"
                rows="6"
                placeholder="Votre message"
                required
            ></textarea>

            <button class="btn" type="submit">

                <i class="fas fa-paper-plane"></i>

                Envoyer

            </button>

        </form>

        <!-- CV -->

        <div class="cv-container">

            <a href="Curriculum vitae DECROS Clara.pdf"
               download
               target="_blank"
               class="cv-btn">

                <i class="fas fa-file-pdf"></i>

                Télécharger mon CV

            </a>

        </div>

    </div>

</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<!-- SCRIPT -->

<script>

function copyMail(){

    navigator.clipboard.writeText("claradecros@gmail.com");

    showToast("Adresse email copiée ✨");

}

function sendMail(event){

    event.preventDefault();

    const email = document.getElementById("email").value;

    const message = document.getElementById("message").value;

    window.location.href =
    `mailto:claradecros@gmail.com?subject=Message Portfolio (${email})&body=${encodeURIComponent(message + "\n\nEnvoyé par : " + email)}`;

    showToast("Ouverture de Gmail ✨");

}

function showToast(text){

    const toast = document.getElementById("toast");

    toast.textContent = text;

    toast.classList.add("show");

    setTimeout(() => {

        toast.classList.remove("show");

    },2500);

}

</script>

</body>
</html>
