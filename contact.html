<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Contacts | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

:root{
    --rose:#d4a3a3;
    --rose-soft:#e7c8c8;
    --text:#2f2f2f;
    --white:#fff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(120deg,#f8f6f4,#f1ebe5);
    color:var(--text);
    min-height:100vh;
}

/* BACKGROUND ANIMÉ */

body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle at 30% 30%, #e7c8c8 0%, transparent 40%),
    radial-gradient(circle at 70% 60%, #d4a3a3 0%, transparent 40%);
    animation:bg 12s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes bg{
    0%{transform:translate(0,0);}
    100%{transform:translate(-10%,-10%);}
}

/* NAV */

.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:15px 0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-item{
    border:none;
    background:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    position:relative;
}

.nav-item i{
    color:var(--rose);
}

/* CONTAINER */

.container{
    max-width:900px;
    margin:120px auto 60px;
    padding:40px;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:50px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.05);
}

/* TITRE */

h1{
    font-family:'Playfair Display',serif;
    font-size:3rem;
}

h1 span{
    color:var(--rose);
}

.line{
    width:80px;
    height:4px;
    background:var(--rose);
    margin:15px auto 30px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:40px;
}

/* BOX */

.box{
    background:rgba(255,255,255,0.4);
    padding:25px;
    border-radius:20px;
}

/* BUTTON */

.btn{
    display:block;
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#2f2f2f;
    color:white;
    transition:0.3s;
}

.btn:hover{
    background:var(--rose);
    transform:translateY(-3px);
}

/* FORM */

form{
    margin-top:50px;
    display:flex;
    flex-direction:column;
    gap:12px;
    max-width:500px;
    margin-inline:auto;
}

input,textarea{
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
    outline:none;
}

textarea{
    resize:none;
}

/* TOAST */

.toast{
    position:fixed;
    bottom:25px;
    right:25px;
    background:#2f2f2f;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    opacity:0;
    transform:translateY(20px);
    transition:0.3s;
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<nav class="nav">
<div class="nav-links">
<button class="nav-item" onclick="location.href='index.html'"><i class="fas fa-home"></i>Accueil</button>
<button class="nav-item" onclick="location.href='infos.html'"><i class="fas fa-user"></i>Profil</button>
<button class="nav-item" onclick="location.href='projets.html'"><i class="fas fa-chart-bar"></i>Projets</button>
<button class="nav-item" onclick="location.href='bilan.html'"><i class="fas fa-book"></i>Bilan</button>
<button class="nav-item"><i class="fas fa-phone"></i>Contact</button>
</div>
</nav>

<div class="container">

<div class="card">

<h1>Contactez-<span>moi</span></h1>
<div class="line"></div>

<div class="grid">

<div class="box">
<i class="fas fa-envelope"></i>
<p>claradecros@gmail.com</p>
<button class="btn" onclick="copyMail()">Copier</button>
</div>

<div class="box">
<i class="fab fa-linkedin"></i>
<p>LinkedIn</p>
<a class="btn" href="https://www.linkedin.com/in/clara-decros-345502342" target="_blank">Ouvrir</a>
</div>

<div class="box">
<i class="fas fa-phone"></i>
<p>06 19 20 01 72</p>
<a class="btn" href="tel:+33619200172">Appeler</a>
</div>

</div>

<!-- FORM -->

<h2 style="margin-top:30px;font-family:'Playfair Display'">Envoyer un message</h2>

<form onsubmit="sendMail(event)">

<input id="email" type="email" placeholder="Votre email" required>
<textarea id="message" rows="5" placeholder="Votre message" required></textarea>

<button class="btn" type="submit">
<i class="fas fa-paper-plane"></i> Envoyer
</button>

</form>

</div>

</div>

<div class="toast" id="toast">Message envoyé ✨</div>

<script>

function copyMail(){
navigator.clipboard.writeText("claradecros@gmail.com");
showToast("Email copié ✨");
}

function sendMail(e){
e.preventDefault();

const mail = document.getElementById("email").value;
const msg = document.getElementById("message").value;

window.location.href =
`mailto:claradecros@gmail.com?subject=Message (${mail})&body=${encodeURIComponent(msg + "\n\nEnvoyé par : " + mail)}`;

showToast("Ouverture de Gmail ✨");
}

function showToast(text){
const toast = document.getElementById("toast");
toast.textContent = text;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2500);
}

</script>

</body>
</html>
