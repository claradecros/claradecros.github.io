<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Contacts | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
   (function(){
      emailjs.init("TON_PUBLIC_KEY"); 
   })();
</script>

<style>

:root{
    --rose:#d4a3a3;
    --rose-soft:#e7c8c8;
    --text:#2f2f2f;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(120deg,#f8f6f4,#f1ebe5);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* FOND ANIMÉ */

body::before{
    content:"";
    position:fixed;
    width:220%;
    height:220%;
    background:
    radial-gradient(circle at 20% 20%, rgba(231,200,200,0.8) 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(212,163,163,0.6) 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(248,235,235,0.8) 0%, transparent 35%);
    animation:bgMove 14s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes bgMove{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(-8%,-8%) scale(1.08); }
}

/* NAVIGATION */

.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:16px 0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
    box-shadow:0 4px 18px rgba(0,0,0,0.04);
}

.nav-links{
    display:flex;
    gap:35px;
}

.nav-item{
    border:none;
    background:none;
    color:var(--text);
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    position:relative;
    font-weight:500;
}

.nav-item i{
    color:var(--rose);
}

.nav-item::after{
    content:"";
    position:absolute;
    width:0;
    height:2px;
    bottom:-6px;
    left:0;
    background:linear-gradient(90deg,var(--rose),var(--rose-soft));
    transition:0.3s ease;
}

.nav-item:hover::after,
.nav-item.active::after{
    width:100%;
}

/* CONTAINER */

.container{
    width:min(92%,1000px);
    margin:130px auto 70px;
}

.contact-card{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(18px);
    border-radius:38px;
    padding:60px;
}

/* TITRE */

h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    text-align:center;
}

h1 span{
    color:var(--rose);
}

.line{
    width:90px;
    height:4px;
    background:linear-gradient(90deg,var(--rose),var(--rose-soft));
    margin:18px auto 30px;
}

/* INTRO */

.intro{
    text-align:center;
    max-width:650px;
    margin:0 auto 50px;
    color:#666;
}

/* GRID */

.contact-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    margin-bottom:50px;
}

/* BOX */

.contact-box{
    background:rgba(255,255,255,0.3);
    border-radius:28px;
    padding:35px 25px;
    text-align:center;
}

.icon-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
}

/* BTN */

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:white;
    background:#2f2f2f;
}

/* FORM */

.form-title{
    text-align:center;
    font-family:'Playfair Display',serif;
    font-size:2rem;
    margin-bottom:25px;
}

form{
    max-width:550px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:16px;
}

input,
textarea{
    padding:16px;
    border-radius:16px;
    border:1px solid rgba(0,0,0,0.08);
    outline:none;
    font-family:'Poppins',sans-serif;
    background:rgba(255,255,255,0.75);
}

/* 👉 placeholder amélioré */
textarea::placeholder{
    color:#b8b8b8;
    font-style:italic;
}

/* CV */

.cv-container{
    text-align:center;
    margin-top:40px;
}

.cv-btn{
    display:inline-flex;
    padding:18px 32px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--rose),#c98d8d);
    color:white;
    text-decoration:none;
}

/* TOAST */

.toast{
    position:fixed;
    bottom:25px;
    right:25px;
    background:rgba(47,47,47,0.95);
    color:white;
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
    transition:0.3s;
}

.toast.show{
    opacity:1;
}

</style>
</head>

<body>

<!-- NAV (inchangée) -->

<nav class="nav">
<div class="nav-links">

<button class="nav-item" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
<button class="nav-item" onclick="location.href='infos.html'"><i class="fas fa-user"></i></button>
<button class="nav-item" onclick="location.href='projets.html'"><i class="fas fa-chart-bar"></i></button>
<button class="nav-item" onclick="location.href='bilan.html'"><i class="fas fa-book"></i></button>
<button class="nav-item active"><i class="fas fa-phone"></i></button>

</div>
</nav>

<div class="container">

<div class="contact-card">

<h1>Contactez-<span>moi</span></h1>

<div class="line"></div>

<p class="intro">
Merci d’avoir pris le temps de découvrir mon univers.
</p>

<!-- CONTACT -->

<div class="contact-grid">

<!-- EMAIL -->
<div class="contact-box">

<div class="icon-circle">
<i class="fas fa-envelope" style="color:var(--rose);"></i>
</div>

<p>claradecros@gmail.com</p>

<button class="btn" onclick="copyMail()">Copier</button>

</div>

</div>

<!-- FORM -->

<h2 class="form-title">Envoyer un message</h2>

<form onsubmit="sendMail(event)">

<input id="email" type="email" placeholder="Votre email" required>

<textarea
id="message"
rows="6"
placeholder="Bonjour Madame Decros...

Je vous contacte car..."
required
></textarea>

<button class="btn" type="submit">
Envoyer
</button>

</form>

<!-- CV -->

<div class="cv-container">
<a class="cv-btn" href="Curriculum vitae DECROS Clara.pdf" download>
Télécharger mon CV
</a>
</div>

</div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>

function copyMail(){
navigator.clipboard.writeText("claradecros@gmail.com");
showToast("Email copié ✨");
}

function sendMail(event){
event.preventDefault();

const email = document.getElementById("email").value;
const message = document.getElementById("message").value;

emailjs.send("TON_SERVICE_ID","TON_TEMPLATE_ID",{
from_email: email,
message: message
})
.then(() => showToast("Message envoyé ✨"))
.catch(() => showToast("Erreur ❌"));
}

function showToast(text){
const toast = document.getElementById("toast");
toast.textContent = text;
toast.classList.add("show");

setTimeout(()=>toast.classList.remove("show"),2500);
}

</script>

</body>
</html>
