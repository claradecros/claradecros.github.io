<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes Contacts | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<!-- EMAILJS (AJOUT UNIQUEMENT ICI) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init("TON_PUBLIC_KEY");
  })();
</script>

<style>

/* ===== TON CSS INCHANGÉ ===== */

:root{
    --rose:#d4a3a3;
    --rose-soft:#e7c8c8;
    --text:#2f2f2f;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(120deg,#f8f6f4,#f1ebe5);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

/* FOND ANIMÉ */

body::before{
    content:"";
    position:fixed;
    width:220%;
    height:220%;
    background:
    radial-gradient(circle at 20% 20%, rgba(231,200,200,0.8) 0%, transparent 35%),
    radial-gradient(circle at 80% 30%, rgba(212,163,163,0.6) 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(248,235,235,0.8) 0%, transparent 35%);
    animation:bgMove 14s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes bgMove{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(-8%,-8%) scale(1.08);}
}

/* NAVIGATION */
.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:16px 0;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.7);
    z-index:1000;
    box-shadow:0 4px 18px rgba(0,0,0,0.04);
}

.nav-links{display:flex;gap:35px;}

.nav-item{
    border:none;
    background:none;
    color:var(--text);
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
}

/* CONTAINER */
.container{
    width:min(92%,1000px);
    margin:130px auto 70px;
}

/* CARTE */
.contact-card{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(18px);
    border-radius:38px;
    padding:60px;
}

/* TITRES */
h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    text-align:center;
}

h1 span{color:var(--rose);}

.intro{
    text-align:center;
    max-width:650px;
    margin:0 auto 50px;
    color:#666;
}

/* CONTACT */
.contact-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.contact-box{
    text-align:center;
}

/* BTN */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:white;
    background:#2f2f2f;
}

/* FORM */
form{
    max-width:550px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:16px;
}

input,textarea{
    padding:16px;
    border-radius:16px;
    border:1px solid rgba(0,0,0,0.08);
}

/* TOAST */
.toast{
    position:fixed;
    bottom:25px;
    right:25px;
    background:#2f2f2f;
    color:white;
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
}

.toast.show{
    opacity:1;
}

</style>
</head>

<body>

<nav class="nav">
<div class="nav-links">

<button class="nav-item" onclick="location.href='index.html'">
<i class="fas fa-home"></i><span>Accueil</span>
</button>

<button class="nav-item" onclick="location.href='infos.html'">
<i class="fas fa-user"></i><span>Profil</span>
</button>

<button class="nav-item" onclick="location.href='projets.html'">
<i class="fas fa-chart-bar"></i><span>Projets</span>
</button>

<button class="nav-item" onclick="location.href='bilan.html'">
<i class="fas fa-book"></i><span>Bilan</span>
</button>

<button class="nav-item active">
<i class="fas fa-phone"></i><span>Contact</span>
</button>

</div>
</nav>

<div class="container">

<div class="contact-card">

<h1>Contactez-<span>moi</span></h1>

<p class="intro">
Merci d’avoir pris le temps de découvrir mon univers.
</p>

<div class="contact-grid">

<!-- EMAIL -->
<div class="contact-box">
<p>claradecros@gmail.com</p>
<button class="btn" onclick="copyMail()">Copier</button>
</div>

<!-- LINKEDIN -->
<div class="contact-box">
<a href="https://www.linkedin.com/in/clara-decros-345502342" target="_blank" class="btn">LinkedIn</a>
</div>

<!-- TEL -->
<div class="contact-box">
<a href="tel:+33619200172" class="btn">Appeler</a>
</div>

</div>

<h2>Envoyer un message</h2>

<form onsubmit="sendMail(event)">

<input id="email" type="email" placeholder="Votre email" required>

<textarea id="message" rows="6"
placeholder="Bonjour Madame Decros..."></textarea>

<button class="btn" type="submit">Envoyer</button>

</form>

</div>
</div>

<div class="toast" id="toast"></div>

<script>

function copyMail(){
navigator.clipboard.writeText("claradecros@gmail.com");
showToast("Email copié");
}

/* 🔥 ENVOI RÉEL EMAILJS */
function sendMail(event){

event.preventDefault();

const email = document.getElementById("email").value;
const message = document.getElementById("message").value;

emailjs.send("TON_SERVICE_ID","TON_TEMPLATE_ID",{
from_email: email,
message: "Bonjour Madame Decros,\n\n" + message + "\n\nEnvoyé par : " + email
})

.then(() => showToast("Message envoyé ✨"))
.catch(() => showToast("Erreur"));

}

function showToast(text){
const toast = document.getElementById("toast");
toast.textContent = text;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}

</script>

</body>
</html>
