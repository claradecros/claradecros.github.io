<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Contacts | Clara Decros</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f6f4;
            --rose: #d4a3a3;
            --rose-soft: #e7c8c8;
            --text: #2f2f2f;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #f8f6f4, #f1ebe5);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, #e7c8c8 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, #d4a3a3 0%, transparent 40%),
                        radial-gradient(circle at 50% 80%, #e8dfd8 0%, transparent 40%);
            animation: moveBg 12s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes moveBg {
            0% {transform: translate(0,0);}
            100% {transform: translate(-10%, -10%);}
        }

        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.7);
            z-index: 100;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-item { border: none; background: none; color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; position: relative; padding: 5px 0; }
        .nav-item i { color: var(--rose); }
        .nav-item::after { content: ""; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background: linear-gradient(90deg, var(--rose), var(--rose-soft)); transition: 0.3s; }
        .nav-item.active::after { width: 100%; }

        .container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 0 20px;
            animation: fadeUp 1s ease;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; text-align: center; margin: 0; }
        h1 span { color: var(--rose); }
        .line { width: 60px; height: 4px; background: var(--rose); margin: 15px auto 35px; border-radius: 2px; }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
        }

        .info-section { display: flex; flex-direction: column; gap: 15px; }
        .contact-link {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: var(--text); padding: 12px;
            background: rgba(255,255,255,0.3); border-radius: 12px; transition: 0.3s;
        }
        .contact-link:hover { background: var(--rose); color: white; }
        .contact-link i { color: var(--rose); width: 20px; transition: 0.3s; }
        .contact-link:hover i { color: white; }

        /* Style de la zone de message */
        .form-section h3 { margin-top: 0; font-family: 'Playfair Display', serif; }
        .form-box { display: flex; flex-direction: column; gap: 12px; }
        textarea {
            padding: 12px; border: none; border-radius: 10px;
            background: rgba(255,255,255,0.6); font-family: inherit;
            border: 1px solid transparent; transition: 0.3s;
            height: 120px; resize: none;
        }
        textarea:focus { outline: none; border-color: var(--rose); background: white; }
        
        .send-btn {
            background: var(--text); color: white; border: none; text-align: center;
            padding: 12px; border-radius: 10px; cursor: pointer; text-decoration: none;
            font-weight: 600; transition: 0.3s;
        }
        .send-btn:hover { background: var(--rose); transform: translateY(-2px); }

        .cv-btn-large {
            grid-column: span 2; text-align: center; margin-top: 10px;
            background: var(--rose); color: white; text-decoration: none;
            padding: 15px; border-radius: 15px; font-weight: 600; transition: 0.3s;
        }
        .cv-btn-large:hover { background: var(--text); transform: scale(1.02); }

        @keyframes fadeUp { from {opacity:0; transform: translateY(20px);} to {opacity:1; transform: translateY(0);} }

        @media(max-width:768px){
            .contact-grid { grid-template-columns: 1fr; }
            .cv-btn-large { grid-column: span 1; }
            .nav-item span { display: none; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-links">
            <button class="nav-item" onclick="location.href='index.html'"><i class="fas fa-home"></i><span>Accueil</span></button>
            <button class="nav-item" onclick="location.href='infos.html'"><i class="fas fa-user"></i><span>Profil</span></button>
            <button class="nav-item" onclick="location.href='projets.html'"><i class="fas fa-chart-bar"></i><span>Projets</span></button>
            <button class="nav-item" onclick="location.href='bilan.html'"><i class="fas fa-book"></i><span>Bilan</span></button>
            <button class="nav-item active" onclick="location.href='contact.html'"><i class="fas fa-phone"></i><span>Contact</span></button>
        </div>
    </nav>

    <div class="container">
        <div class="contact-card">
            <h1>Contactez-<span>moi</span></h1>
            <div class="line"></div>
            
            <div class="contact-grid">
                <div class="info-section">
                    <a href="mailto:claradecros@gmail.com" class="contact-link">
                        <i class="fas fa-envelope"></i> <span>claradecros@gmail.com</span>
                    </a>
                    <a href="tel:+33619200172" class="contact-link">
                        <i class="fas fa-phone"></i> <span>06 19 20 01 72</span>
                    </a>
                    <a href="https://www.linkedin.com/in/clara-decros-345502342" target="_blank" class="contact-link">
                        <i class="fab fa-linkedin"></i> <span>LinkedIn</span>
                    </a>
                </div>

                <div class="form-section">
                    <h3>Écrire un message</h3>
                    <div class="form-box">
                        <textarea id="userMessage" placeholder="Tapez votre message ici..."></textarea>
                        <button onclick="sendEmail()" class="send-btn">Envoyer l'email</button>
                    </div>
                </div>

                <a href="Curriculum vitae DECROS Clara.pdf" target="_blank" download class="cv-btn-large">
                    <i class="fas fa-file-pdf"></i> Télécharger mon Curriculum Vitae
                </a>
            </div>
        </div>
    </div>

    <script>
        function sendEmail() {
            const message = document.getElementById('userMessage').value;
            const subject = "Contact depuis mon Portfolio";
            const mailtoLink = `mailto:claradecros@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
            
            window.location.href = mailtoLink;
        }
    </script>

</body>
</html>
