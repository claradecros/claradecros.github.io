<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Projets | Clara Decros</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #f8f6f4;
    --rose: #d4a3a3;
    --rose-soft: #e7c8c8;
    --text: #2f2f2f;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #f8f6f4, #f1ebe5);
    color: var(--text);
}

/* Background animé */
body::before {
    content: "";
    position: fixed;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, #e7c8c8 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, #d4a3a3 0%, transparent 40%);
    animation: moveBg 12s infinite alternate ease-in-out;
    z-index: -1;
}

@keyframes moveBg {
    0% {transform: translate(0,0);}
    100% {transform: translate(-10%, -10%);}
}

/* NAVBAR */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 15px 0;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.7);
    z-index: 100;
}

.nav-links {
    display: flex;
    gap: 30px;
}

.nav-item {
    border: none;
    background: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
}

.nav-item i {
    color: var(--rose);
}

.nav-item.active::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: var(--rose);
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: 120px auto 60px;
    padding: 0 20px;
}

/* TITRE */
h1 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
}

h1 span {
    color: var(--rose);
}

.line {
    width: 60px;
    height: 4px;
    background: var(--rose);
    margin: 15px auto 40px;
    border-radius: 2px;
}

/* GRID */
.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
}

/* CARTES */
.project-card {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.05);
    border: 1px solid rgba(255,255,255,0.3);
    transition: 0.3s;
    display: flex;
    flex-direction: column;
}

.project-card:hover {
    transform: translateY(-5px);
}

/* TEXTE */
.project-card h2 {
    font-size: 1.1rem;
    margin-bottom: 10px;
}

.project-card p {
    font-size: 0.9rem;
    flex-grow: 1;
}

/* BOUTON */
.btn {
    margin-top: 15px;
    background: var(--text);
    color: white;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    text-align: center;
    transition: 0.3s;
}

.btn:hover {
    background: var(--rose);
}

/* RESPONSIVE */
@media(max-width:768px){
    .nav-item span { display:none; }
}
</style>
</head>

<body>

<nav class="nav">
<div class="nav-links">
<button class="nav-item" onclick="location.href='index.html'"><i class="fas fa-home"></i><span>Accueil</span></button>
<button class="nav-item" onclick="location.href='infos.html'"><i class="fas fa-user"></i><span>Profil</span></button>
<button class="nav-item active" onclick="location.href='projets.html'"><i class="fas fa-chart-bar"></i><span>Projets</span></button>
<button class="nav-item" onclick="location.href='bilan.html'"><i class="fas fa-book"></i><span>Bilan</span></button>
<button class="nav-item" onclick="location.href='contact.html'"><i class="fas fa-phone"></i><span>Contact</span></button>
</div>
</nav>

<div class="container">

<h1>Mes <span>projets</span></h1>
<div class="line"></div>

<div class="projects-grid">

<div class="project-card">
<h2>SAÉ 1.01</h2>

</div>

</div>

</div>
</div>

</body>
</html>
